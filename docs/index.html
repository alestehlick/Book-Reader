<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Audio Reader</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="eyebrow">Audio Reader</div>
        <h1 id="bookTitle">Loading…</h1>
      </div>

      <div class="sidebar-section">
        <div class="eyebrow">Sections</div>
        <nav id="sectionsNav" class="sections-nav"></nav>
      </div>
    </aside>

    <main class="main-panel">
      <header class="topbar card">
        <button id="toggleSidebarBtn" class="icon-btn" type="button" aria-label="Toggle sections panel">
          ☰
        </button>

        <div class="topbar-center">
          <div class="eyebrow">Now Reading</div>
          <div id="nowReadingTitle" class="topbar-title">—</div>
        </div>

        <button id="themeToggleBtn" class="icon-btn" type="button" aria-label="Toggle theme">
          ◐
        </button>
      </header>

      <section class="card player-card">
        <div class="player-meta">
          <div class="eyebrow" id="playerSectionLabel">Section — Paragraph</div>
          <h2 id="playerParagraphLabel" class="player-paragraph-label">—</h2>
          <div id="playerTimeRange" class="time-range">0:00</div>
        </div>

        <div class="player-controls-row">
          <button id="prevBtn" class="control-btn" type="button">Previous</button>
          <button id="playPauseBtn" class="control-btn primary" type="button">Play</button>
          <button id="nextBtn" class="control-btn" type="button">Next</button>
        </div>

        <div class="toggle-row">
          <label class="toggle-item">
            <input id="continuousToggle" type="checkbox" checked />
            <span>Continuous playback</span>
          </label>

          <label class="toggle-item">
            <input id="oneParagraphToggle" type="checkbox" checked />
            <span>One-paragraph mode</span>
          </label>
        </div>

        <div class="progress-wrap">
          <input id="progressBar" type="range" min="0" max="100" value="0" step="0.1" />
          <div class="progress-times">
            <span id="currentTimeLabel">0:00</span>
            <span id="durationLabel">0:00</span>
          </div>
        </div>
      </section>

      <section class="card current-card">
        <div class="eyebrow">Current Paragraph</div>
        <div id="currentParagraphText" class="current-paragraph-text">Loading…</div>
      </section>

      <section id="contextGrid" class="context-grid">
        <article class="card context-card">
          <div class="eyebrow">Previous</div>
          <div id="previousParagraphText" class="context-text">—</div>
        </article>

        <article class="card context-card">
          <div class="eyebrow">Next</div>
          <div id="nextParagraphText" class="context-text">—</div>
        </article>
      </section>
    </main>
  </div>

  <audio id="audioPlayer" preload="metadata"></audio>

  <!-- IMPORTANT: data file must be loaded before app.js -->
  <script src="chapter1-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
