<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Book Reader Library</title>
  <style>
    :root {
      --bg: #0b0908;
      --panel: #181311;
      --text: #f1e7d8;
      --muted: #b7a58d;
      --accent: #c7a06a;
      --line: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Times New Roman", Times, serif;
      background: linear-gradient(180deg, #120e0b 0%, var(--bg) 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .wrap {
      width: min(820px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 36px 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2.2rem;
      font-weight: normal;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .links {
      display: grid;
      gap: 16px;
    }

    .book-link {
      display: block;
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 18px;
      color: var(--text);
      text-decoration: none;
      background: rgba(255,255,255,0.02);
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .book-link:hover {
      transform: translateY(-1px);
      border-color: rgba(199,160,106,0.35);
      background: rgba(199,160,106,0.08);
    }

    .book-title {
      display: block;
      font-size: 1.35rem;
      margin-bottom: 4px;
    }

    .book-subtitle {
      display: block;
      color: var(--muted);
      font-size: 0.98rem;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Book Reader Library</h1>
    <p>Select a book collection:</p>

    <div class="links">
      <a class="book-link" href="./Molecular%20Biology/">
        <span class="book-title">Molecular Biology</span>
        <span class="book-subtitle">B. Alberts et al.</span>
      </a>

      <a class="book-link" href="./History%20of%20Ancient%20China/">
        <span class="book-title">History of Ancient China</span>
        <span class="book-subtitle">M. Loewe and E. L. Shaughnessy</span>
      </a>
	  


    </div>
  </main>
</body>
</html>
