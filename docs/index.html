<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Audio Reader</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <div class="eyebrow">Audio Reader</div>
        <h1 id="bookTitle">Loading…</h1>
        <p class="sidebar-sub" id="bookMeta"></p>
      </div>

      <div class="sidebar-block">
        <div class="block-title">Sections</div>
        <nav id="sectionList" class="section-list"></nav>
      </div>
    </aside>

    <main class="reader">
      <header class="topbar">
        <button class="ghost" id="menuButton" aria-label="Toggle section list">☰</button>
        <div class="topbar-center">
          <div class="now-reading-label">Now reading</div>
          <div class="now-reading" id="nowReading">—</div>
        </div>
        <button class="ghost" id="themeButton" aria-label="Toggle theme">◐</button>
      </header>

      <section class="hero-card">
        <div class="hero-meta" id="heroMeta">Section — Paragraph</div>
        <h2 class="hero-title" id="sectionTitle">—</h2>
        <div class="paragraph-range" id="paragraphRange">0:00 – 0:00</div>
        <div class="progress-wrap">
          <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
          <div class="progress-text" id="progressText">0:00 / 0:00</div>
        </div>
      </section>

      <section class="text-stage">
        <article class="paragraph-card" id="paragraphCard">
          <div class="paragraph-label">Current paragraph</div>
          <p class="paragraph-text" id="paragraphText">Tap play to begin.</p>
        </article>

        <div class="context-row">
          <article class="context-card dim" id="prevCard">
            <div class="context-label">Previous</div>
            <p id="prevText">—</p>
          </article>
          <article class="context-card dim" id="nextCard">
            <div class="context-label">Next</div>
            <p id="nextText">—</p>
          </article>
        </div>
      </section>

      <footer class="controls-card">
        <div class="main-controls">
          <button class="control secondary" id="prevBtn">⟨ Prev</button>
          <button class="control primary" id="playBtn">Play</button>
          <button class="control secondary" id="nextBtn">Next ⟩</button>
        </div>

        <div class="sub-controls">
          <label class="toggle">
            <input type="checkbox" id="autoplayToggle" checked>
            <span>Continuous playback</span>
          </label>
          <label class="toggle">
            <input type="checkbox" id="revealToggle" checked>
            <span>One-paragraph mode</span>
          </label>
          <button class="pill" id="restartBtn">Restart paragraph</button>
        </div>
      </footer>
    </main>
  </div>

  <audio id="audioEl" preload="metadata"></audio>

  <script src="chapter1-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
